<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問題係ホームページ</title>

<style>
body{
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
}

h1{
  margin-top:20px;
  font-size:40px;
}

p{
  color:#aaa;
  margin-bottom:50px;
}

.apps{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
  max-width:700px;
  margin:auto;
  padding:20px;
}

.app{
  text-decoration:none;
  color:white;
}

.app img{
  width:90px;
  height:90px;
  background:#222;
  padding:15px;
  border-radius:25px;
  transition:0.2s;
  object-fit:cover;
}

.app img:hover{
  transform:scale(1.1);
  background:#333;
}

.app span{
  display:block;
  margin-top:10px;
  font-size:18px;
}

.logo{
  width:140px;
  margin-top:30px;
}
</style>
</head>

<body>

<!-- ロゴ -->
<img src="Preview.png" class="logo">

<h1>問題係ホームページ</h1>
<p>MONDAI LIMITED</p>

<div class="apps">

  <!-- 電卓 -->
  <a href="https://sites.google.com/view/monndai-com/%E9%9B%BB%E5%8D%93" class="app">
    <img src="calculator.png.jpg">
    <span>電卓</span>
  </a>

  <!-- 奥村新聞 -->
  <a href="https://sites.google.com/view/wwwokumuranews-com/%E3%83%9B%E3%83%BC%E3%83%A0" class="app">
    <img src="news.pngjpg">
    <span>新聞</span>
  </a>

  <!-- MONDAISNS -->
  <a href="https://sites.google.com/view/monndaic/%E3%83%9B%E3%83%BC%E3%83%A0" class="app">
    <img src="sns.png.jpg">
    <span>SNS</span>
  </a>

</div>

</body>
</html>
