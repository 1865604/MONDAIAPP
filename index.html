<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
body{
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
}

.apps{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
  max-width:700px;
  margin:auto;
  padding:20px;
}

.app{
  cursor:pointer;
}

.app img{
  width:90px;
  height:90px;
  border-radius:25px;
}

.app span{
  display:block;
  margin-top:10px;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<h1>問題係ホームページ</h1>
<p>MONDAI LIMITED</p>

<div class="apps">

<!-- 電卓 -->
<div class="app"
onclick="window.top.location.href='https://sites.google.com/view/monndai-com/%E9%9B%BB%E5%8D%93'">
<img src="calculator.png.jpg">
<span>電卓</span>
</div>

<!-- 新聞 -->
<div class="app"
onclick="window.top.location.href='https://sites.google.com/view/wwwokumuranews-com/%E3%83%9B%E3%83%BC%E3%83%A0'">
<img src="news.png.jpg">
<span>新聞</span>
</div>

<!-- SNS -->
<div class="app"
onclick="window.top.location.href='https://sites.google.com/view/monndaic/%E3%83%9B%E3%83%BC%E3%83%A0'">
<img src="sns.png.jpg">
<span>SNS</span>
</div>

</div>

</body>
</html>
